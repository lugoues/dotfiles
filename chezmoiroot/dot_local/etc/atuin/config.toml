style = "compact"
inline_height = 15
#search_mode = "fuzzy"
# search_mode = "skim"
search_mode = "daemon-fuzzy"
exit_mode = "return-original"

filter_mode = "host"
filter_mode_shell_up_key_binding = "session"

# Git repos = workspace
workspaces = true

sync_frequency = "10m"
auto_sync = true

# keymap_mode="vim-insert"
history_filter = [
  "^[ \t]*where.*$",
  "^[ \t]*which.*$",
  "^[ \t]*vim[ \t]*$",
  "^[ \t]*pwd[ \t]*$",
  "^[ \t]*su[ \t]*$",
  # "^[ \t]*sudo[ \t]*$",
  "^[ \t]*clear[ \t;]*$",
  "^[ \t]*cd[ \t]+(?:\\.(?:/|\\\\)?|\\.\\.(?:/|\\\\)?|~(?:/|\\\\)?|/)+[ \t]*$",
  "^[ \t]*ls(?:[ \t]*-[a-zA-Z]+)*[ \t]*(?:/[ \t]*$|~[ \t]*$|(?:\\.\\.(?:/|$))+[ \t]*$|[ \t]*$)"
]

common_subcommands = [
  "apt",
  "cargo",
  "composer",
  "dnf",
  "docker",
  "git",
  "go",
  "ip",
  "kubectl",
  "nix",
  "nmcli",
  "npm",
  "pecl",
  "pnpm",
  "podman",
  "port",
  "systemctl",
  "tmux",
  "yarn",
  "gt",
]

[sync]
records = true

[daemon]
enabled = true
autostart = true
